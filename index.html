<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Martie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg0:#07080f;
  --cherry1:#f9c8d8;
  --cherry2:#f4a0bc;
  --peony2:#f8c4d8;
  --gold:#d4a85a;
  --stem:#2d5c3a;
  --stem2:#3d7a50;
  --text:#f5eef0;
  --subtext:#c4aab8;
}

html,body{
  width:100%;height:100%;
  background:var(--bg0);
  overflow:hidden;
  cursor:none;
}

#cursor{
  position:fixed;width:8px;height:8px;
  background:#fce8f2;border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
}
#cursor-trail{
  position:fixed;width:28px;height:28px;
  border:1px solid rgba(249,200,216,0.3);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:left .18s ease,top .18s ease;
}

.sky{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, #1a1035 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% -5%, #0d1530 0%, transparent 55%),
    linear-gradient(180deg,#07080f 0%,#0c0e1c 40%,#111428 70%,#0d1118 100%);
}

#stars{position:fixed;inset:0;pointer-events:none}
.s{
  position:absolute;border-radius:50%;background:#fff;
  animation:twk var(--t,3s) ease-in-out infinite var(--d,0s);
}
@keyframes twk{
  0%,100%{opacity:var(--a,.1);transform:scale(1)}
  50%{opacity:var(--b,.8);transform:scale(1.4)}
}

.moon{
  position:fixed;top:5vh;left:12vw;
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#fffef5,#f8ebb0 50%,#e0c878 85%);
  box-shadow:0 0 40px 12px rgba(220,190,100,.22),0 0 90px 35px rgba(200,170,80,.09);
  animation:mf 9s ease-in-out infinite;
}
.moon-halo{
  position:fixed;top:calc(5vh - 25px);left:calc(12vw - 25px);
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,240,160,.06) 0%,transparent 70%);
  pointer-events:none;animation:mf 9s ease-in-out infinite;
}
@keyframes mf{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

canvas{position:fixed;inset:0;pointer-events:none;z-index:2}

.fog{
  position:fixed;bottom:0;left:0;right:0;height:25vh;
  background:linear-gradient(to top,rgba(8,12,18,.9) 0%,rgba(8,12,18,.35) 55%,transparent 100%);
  pointer-events:none;z-index:3;
}

.stage{
  position:fixed;inset:0;display:flex;
  align-items:flex-end;justify-content:center;
  z-index:4;pointer-events:none;
}
.stage svg{
  width:min(940px,100vw);
  height:88vh;overflow:visible;
}

.overlay{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;pointer-events:none;
  padding-bottom:10vh;
}
.badge{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:clamp(10px,1.15vw,13px);
  letter-spacing:.72em;color:var(--gold);
  text-transform:uppercase;opacity:0;
  animation:fu 1.4s cubic-bezier(.16,1,.3,1) forwards .8s;
  margin-bottom:1.2em;
}
.title{
  font-family:'Playfair Display',serif;
  font-weight:400;font-style:italic;
  font-size:clamp(56px,9.5vw,125px);
  line-height:.9;color:var(--text);
  text-align:center;opacity:0;
  animation:fu 1.6s cubic-bezier(.16,1,.3,1) forwards 1.2s;
  text-shadow:0 0 80px rgba(249,200,216,.12);
}
.title em{
  font-style:normal;color:#f8c4d8;
  display:block;
}
.divider{
  width:1px;height:0;
  background:linear-gradient(to bottom,transparent,var(--gold),transparent);
  margin:1.4em auto;opacity:0;
  animation:dv 1.2s cubic-bezier(.16,1,.3,1) forwards 1.9s;
}
@keyframes dv{0%{height:0;opacity:0}100%{height:60px;opacity:.55}}
.sub{
  font-family:'Jost',sans-serif;font-weight:300;
  font-size:clamp(11px,1.4vw,15px);
  letter-spacing:.28em;color:var(--subtext);
  text-align:center;opacity:0;
  animation:fu 1.2s cubic-bezier(.16,1,.3,1) forwards 2.4s;
}
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* SVG anims */
.grow-stem{
  animation:gst var(--dur,1.8s) cubic-bezier(.23,1,.32,1) both var(--d,0s);
  transform-origin:bottom center;
}
@keyframes gst{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}

.bloom{
  animation:blm var(--dur,1.2s) cubic-bezier(.23,1,.32,1) both var(--d,0s);
  transform-origin:50% 80%;
}
@keyframes blm{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}

.leaf-in{
  animation:lfi var(--dur,1.1s) cubic-bezier(.23,1,.32,1) both var(--d,0s);
}
@keyframes lfi{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

.sway{animation:sw var(--sw,5s) ease-in-out infinite alternate var(--sd,0s);transform-origin:bottom center}
@keyframes sw{from{transform:rotate(var(--r1,-1.5deg))}to{transform:rotate(var(--r2,1.5deg))}}

.ff{
  position:fixed;width:3px;height:3px;border-radius:50%;
  background:#a8e8c0;
  box-shadow:0 0 7px 3px rgba(168,232,192,.65);
  pointer-events:none;z-index:5;
  animation:ffa var(--ft,8s) ease-in-out infinite var(--fd,0s);
  opacity:0;
}
@keyframes ffa{
  0%{opacity:0;transform:translate(0,0)}
  15%{opacity:.9}85%{opacity:.6}
  100%{opacity:0;transform:translate(var(--fx,40px),var(--fy,-70px))}
}

.grain{
  position:fixed;inset:0;pointer-events:none;z-index:20;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
</style>
</head>

<!-- TEXT -->
<div class="overlay">
  <div class="badge">8 · Martie · 2026</div>
  <div class="title">o floare<em>pentru altă floare</em></div>
  <div class="divider"></div>
</div>

<div class="grain"></div>

<script>
// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<160;i++){
  const s=document.createElement('div');s.className='s';
  const sz=Math.random()*2.4+.4;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*65}%;width:${sz}px;height:${sz}px;--t:${(Math.random()*4+1.5).toFixed(1)}s;--d:-${(Math.random()*6).toFixed(1)}s;--a:${(Math.random()*.15+.04).toFixed(2)};--b:${(Math.random()*.5+.3).toFixed(2)}`;
  starsEl.appendChild(s);
}

// Canvas falling petals
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

const PC=['#fce8f2','#f8d2e8','#f6c4e0','#fde8f4','#f0c0d8','#fce4f0','#f8e0f0'];
const petals=Array.from({length:65},()=>({
  x:Math.random()*(W+400)-100,
  y:Math.random()*-H*1.8-30,
  vx:(Math.random()-.5)*.55,
  vy:Math.random()*1.3+.45,
  rot:Math.random()*Math.PI*2,
  vrot:(Math.random()-.5)*.038,
  rx:Math.random()*5.5+3.5,
  ry:Math.random()*3.5+2,
  alpha:Math.random()*.55+.25,
  color:PC[Math.floor(Math.random()*PC.length)],
  delay:Math.random()*280,
  wave:Math.random()*Math.PI*2
}));

let tick=0;
(function draw(){
  ctx.clearRect(0,0,W,H);
  tick++;
  petals.forEach(p=>{
    if(tick<p.delay)return;
    p.wave+=.018;
    p.x+=p.vx+Math.sin(p.wave)*.3;
    p.y+=p.vy;
    p.rot+=p.vrot;
    if(p.y>H+40){p.y=-40;p.x=Math.random()*(W+200)-100;p.wave=Math.random()*Math.PI*2}
    ctx.save();
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=p.alpha;
    ctx.beginPath();ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(draw);
})();

// Fireflies
const ffWrap=document.getElementById('ff-wrap');
for(let i=0;i<18;i++){
  const f=document.createElement('div');f.className='ff';
  f.style.cssText=`left:${8+Math.random()*84}%;top:${32+Math.random()*48}%;--ft:${(Math.random()*5+5.5).toFixed(1)}s;--fd:-${(Math.random()*10).toFixed(1)}s;--fx:${(Math.random()*100-50).toFixed(0)}px;--fy:-${(Math.random()*95+25).toFixed(0)}px`;
  ffWrap.appendChild(f);
}

// Cursor
const cur=document.getElementById('cursor');
const ctr=document.getElementById('cursor-trail');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  ctr.style.left=e.clientX+'px';ctr.style.top=e.clientY+'px';
});
</script>
